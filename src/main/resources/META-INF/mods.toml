modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="biravijet"
logoFile="icon.png"
logoBlur=false
displayTest="MATCH_VERSION"
description='''
A polished login and account protection mod for Minecraft Forge 1.20.1.
Made for real players and real servers: simple to use, quiet in everyday play,
and strict on the server side where authorization actually matters.
'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
